name: CI (self-hosted)

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run on self-hosted (or 'data_load' by default)"
        required: true
        default: "data_load"
        type: choice
        options:
          - data_load
          - data_quality_analysis
          - visualization

jobs:
  run-on-self-hosted:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run pytest on selected module
        run: |
          mkdir -p artifacts/${{ github.event.inputs.module }}
          echo "Running tests for ${{ github.event.inputs.module }} on self-hosted runner"
          pytest -q > artifacts/${{ github.event.inputs.module }}/pytest.log 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-artifacts-${{ github.event.inputs.module }}
          path: artifacts/${{ github.event.inputs.module }}

