name: CI (modules)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    outputs:
      changed_modules: ${{ steps.collect.outputs.changed_modules }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths by module
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            data_load:
              - 'src/data_load/**'
              - 'src/constants.py'
              - 'requirements.txt'
              - 'pyproject.toml'
            data_quality_analysis:
              - 'src/data_quality_analysis/**'
              - 'src/constants.py'
              - 'requirements.txt'
              - 'pyproject.toml'
            data_research:
              - 'src/data_research/**'
              - 'src/constants.py'
              - 'requirements.txt'
              - 'pyproject.toml'
            visualization:
              - 'src/visualization/**'
              - 'reports/figures/**'
              - 'requirements.txt'
              - 'pyproject.toml'

      - name: Collect changed modules
        id: collect
        run: |
          CHANGED=""
          if [ "${{ steps.filter.outputs.data_load }}" = "true" ]; then
            CHANGED="$CHANGED data_load"
          fi
          if [ "${{ steps.filter.outputs.data_quality_analysis }}" = "true" ]; then
            CHANGED="$CHANGED data_quality_analysis"
          fi
          if [ "${{ steps.filter.outputs.data_research }}" = "true" ]; then
            CHANGED="$CHANGED data_research"
          fi
          if [ "${{ steps.filter.outputs.visualization }}" = "true" ]; then
            CHANGED="$CHANGED visualization"
          fi
          echo "changed_modules=$CHANGED" >> "$GITHUB_OUTPUT"

  run-modules:
    runs-on: ubuntu-latest
    needs: [detect-changes]

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    # Якщо workflow_dispatch і обрано конкретний модуль — пропускаємо інші.
    # При push/pull_request намагаємось не запускати модулі, яких не торкнулися зміни.
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module)) || (github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.changed_modules == '' || contains(needs.detect-changes.outputs.changed_modules, matrix.module))) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run pytest for module
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          echo "Running tests for ${{ matrix.module }}"
          # Запуск pytest; у майбутньому можна зробити окремі директорії tests/<module>
          pytest -q > artifacts/${{ matrix.module }}/pytest.log 2>&1

      - name: Collect additional artifacts
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          # Для модуля visualization зібрати фігури
          if [ "${{ matrix.module }}" = "visualization" ]; then
            if [ -d "reports/figures" ]; then
              cp -R reports/figures artifacts/visualization/ || true
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}