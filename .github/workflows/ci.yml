name: CI (modules)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  detect-changes:
    name: Resolve modules to run
    runs-on: ubuntu-latest

    outputs:
      modules: ${{ steps.result.outputs.modules }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths by module
        id: paths
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            data_load:
              - 'src/data_load/**'
              - 'src/constants.py'
              - 'requirements.txt'
            data_quality_analysis:
              - 'src/data_quality_analysis/**'
              - 'src/constants.py'
              - 'requirements.txt'
            data_research:
              - 'src/data_research/**'
              - 'src/constants.py'
              - 'requirements.txt'
            visualization:
              - 'src/visualization/**'
              - 'reports/figures/**'
              - 'requirements.txt'

      # Build a JSON array of modules that will be run.
      - name: Resolve outputs
        id: result
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          INPUT="${{ github.event.inputs.module }}"
          modules=()

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            for mod in data_load data_quality_analysis data_research visualization; do
              if [[ "$INPUT" == "all" || "$INPUT" == "$mod" ]]; then
                modules+=("$mod")
              fi
            done
          else
            [[ "${{ steps.paths.outputs.data_load }}"             == "true" ]] && modules+=("data_load")
            [[ "${{ steps.paths.outputs.data_quality_analysis }}" == "true" ]] && modules+=("data_quality_analysis")
            [[ "${{ steps.paths.outputs.data_research }}"         == "true" ]] && modules+=("data_research")
            [[ "${{ steps.paths.outputs.visualization }}"         == "true" ]] && modules+=("visualization")
          fi

          if [[ ${#modules[@]} -eq 0 ]]; then
            echo 'modules=[]' >> "$GITHUB_OUTPUT"
          else
            json=$(printf ',"%s"' "${modules[@]}")
            echo "modules=[${json:1}]" >> "$GITHUB_OUTPUT"
          fi

  run-modules:
    name: "Run › ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.modules != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f src/requirements.txt ]; then pip install -r src/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run pytest for module
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          # data_research не має тестів — запускаємо заглушку
          if [ "${{ matrix.module }}" = "data_research" ]; then
            echo "No tests for data_research yet" \
              > artifacts/data_research/pytest.log
          else
            pytest tests/${{ matrix.module }} \
              --junitxml=artifacts/${{ matrix.module }}/pytest-report.xml \
              -q 2>&1 | tee artifacts/${{ matrix.module }}/pytest.log
          fi

      - name: Collect additional artifacts
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          if [ "${{ matrix.module }}" = "visualization" ]; then
            if [ -d "reports/figures" ]; then
              cp -R reports/figures artifacts/visualization/ || true
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}
