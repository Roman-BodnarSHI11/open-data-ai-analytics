apiVersion: apps/v1
kind: Deployment
metadata:
  name: openapp
  namespace: openapp
  labels:
    app: openapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openapp
  template:
    metadata:
      labels:
        app: openapp
      annotations:
        config-version: "v1"
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: html-volume
          configMap:
            name: openapp-html