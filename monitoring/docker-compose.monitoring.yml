services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # Монтуємо нашу конфігурацію всередину контейнера
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      # Persistent storage, щоб дашборди й налаштування не пропали при рестарті
      - grafana_data:/var/lib/grafana
      # Автоматичне підключення Prometheus як джерела даних
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      # Початковий пароль адміна — поміняти після першого входу
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # Потрібен доступ до /proc, /sys для читання системних метрик хоста
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    # cAdvisor моніторить інші контейнери, тому йому потрібен доступ
    # до Docker socket і до системних директорій
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"  # 8081 ззовні, бо 8080 зайнятий твоїм веб-сервісом
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge